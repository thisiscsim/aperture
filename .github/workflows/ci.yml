name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared EDL package
        run: npm run build:edl

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # The full app build resolves every asset/CSS import — typecheck and
      # vitest don't, which once let ignored-but-imported files slip through.
      - name: Build app
        run: npm run build
